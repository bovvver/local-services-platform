name: local-services-platform
services:

  user-postgres:
    image: postgres:16-alpine
    container_name: user-postgres
    environment:
      POSTGRES_USER: ${USER_POSTGRES_USER}
      POSTGRES_PASSWORD: ${USER_POSTGRES_PASSWORD}
      POSTGRES_DB: ${USER_POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ../volumes/user-postgres:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend

  booking-postgres:
    image: postgres:16-alpine
    container_name: booking-postgres
    environment:
      POSTGRES_USER: ${BOOKING_POSTGRES_USER}
      POSTGRES_PASSWORD: ${BOOKING_POSTGRES_PASSWORD}
      POSTGRES_DB: ${BOOKING_POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ../volumes/booking-postgres:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend

  offer-mongo:
    image: mongo:7
    container_name: offer-mongo-primary
    ports:
      - "${OFFER_MONGO_INITDB_PORT:-27017}:27017"
    command: >
      bash -c "
        openssl rand -base64 756 > /tmp/mongodb-keyfile;
        chmod 400 /tmp/mongodb-keyfile;
        chown 999:999 /tmp/mongodb-keyfile;
        mongod --replSet offer-mongo-rs --bind_ip_all --keyFile /tmp/mongodb-keyfile
      "
    healthcheck:
      test: >
        mongosh admin -u ${OFFER_MONGO_INITDB_ROOT_USERNAME} -p ${OFFER_MONGO_INITDB_ROOT_PASSWORD} --eval "
          try {
            rs.status();
          } catch(e) {
            rs.initiate({
              _id: 'offer-mongo-rs',
              members: [{ _id: 0, host: '${OFFER_MONGO_INITDB_HOST:-localhost}:${OFFER_MONGO_INITDB_PORT:-27017}' }]
            });
          }
        " || exit 1
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 40s
    volumes:
      - ../volumes/offer-mongo:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${OFFER_MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${OFFER_MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${OFFER_MONGO_INITDB_DATABASE}
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_API_KEY: ${KEYCLOAK_API_KEY}
      GATEWAY_URL: ${GATEWAY_URL}
    ports:
      - "${KEYCLOAK_PORT_HOST:-7080}:8080"
    volumes:
      - ../volumes/keycloak_data:/opt/keycloak/data
      - ../volumes/keycloak_themes:/opt/keycloak/themes
      - ../volumes/keycloak_providers:/opt/keycloak/providers
    networks:
      - backend

  kafka:
    image: docker.io/bitnami/kafka:3.9
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:${KAFKA_EXTERNAL_PORT:-9092}"
    volumes:
      - ../volumes/kafka:/bitnami
      - ../volumes/kafka/logs:/var/lib/kafka/data
    environment:
      - KAFKA_KRAFT_MODE=true
      - KAFKA_CFG_NODE_ID=${KAFKA_CFG_NODE_ID}
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENERS=INTERNAL://:29092,EXTERNAL://:${KAFKA_EXTERNAL_PORT:-9092},CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT:-9092}
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_KRAFT_CLUSTER_ID=${KAFKA_KRAFT_CLUSTER_ID}
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG_RETENTION_HOURS=168
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    networks:
      - backend

  kafdrop:
    image: obsidiandynamics/kafdrop
    ports:
      - "8081:9000"
    environment:
      - KAFKA_BROKERCONNECT=kafka:29092
    depends_on:
      - kafka
    networks:
      - backend

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}
    command: server /data --console-address ":9001"
    volumes:
      - ../volumes/minio-data:/data
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  backend:
    driver: bridge