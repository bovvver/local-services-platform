spring:
  data:
    mongodb:
      uri: mongodb://${OFFER_MONGO_INITDB_ROOT_USERNAME}:${OFFER_MONGO_INITDB_ROOT_PASSWORD}@${OFFER_MONGO_INITDB_HOST:localhost}:27017/${OFFER_MONGO_INITDB_DATABASE}?authSource=admin&replicaSet=${OFFER_MONGO_REPLICA_SET_NAME}&directConnection=true
logging:
  level:
    ROOT: INFO
  pattern:
    console: OFFER-SERVICE >> %msg%n